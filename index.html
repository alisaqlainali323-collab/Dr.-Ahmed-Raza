/* ── PROFESSIONAL NAVBAR ─────────────────────────────────── */
.site-header{
  position:sticky;top:0;z-index:100;
  width:100%;
  background:rgba(255,255,255,.98);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(219,230,243,.8);
  box-shadow:0 1px 20px rgba(7,26,63,.06);
}
.site-header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:0;
  width:100%;
  max-width:none;
  /* Match hero left-col padding exactly: hero-v2-left uses padding-left:48px on ≥900px, 72px on ≥1100px */
  padding:0 72px;
  height:70px;
  box-sizing:border-box;
}
.brand{
  display:inline-flex;align-items:center;gap:10px;
  flex-shrink:0;text-decoration:none;
}
.brand-mark{
  display:grid;place-items:center;
  width:36px;height:36px;border-radius:10px;
  background:var(--primary);
  color:#fff;font-size:16px;font-weight:800;line-height:1;flex-shrink:0;
}
.brand strong{
  display:block;font-size:14.5px;font-weight:800;
  letter-spacing:.07em;text-transform:uppercase;color:#0b4a99;
}
.brand small{
  display:block;margin-top:1px;color:var(--muted);
  font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
}
/* Nav links — right side */
.site-nav{
  display:none;
  align-items:center;
  gap:2px;
  margin:0;padding:0;list-style:none;
  margin-left:auto;
}
.site-nav a{
  display:inline-block;
  padding:7px 16px;
  border-radius:7px;
  color:#3d5070;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  transition:background .14s,color .14s;
  white-space:nowrap;position:relative;
}
.site-nav a:hover{
  background:rgba(11,74,153,.07);color:var(--primary);
}
.site-nav a.is-active{
  color:var(--primary);
}
.site-nav a.is-active::after{
  content:'';
  position:absolute;bottom:-2px;left:12px;right:12px;
  height:2px;border-radius:999px;
  background:var(--primary);
}
/* CTA button */
.nav-cta-wrap{
  display:none;
  align-items:center;gap:0;
  margin-left:5px;flex-shrink:0;
}
.nav-divider{
  width:1px;height:20px;background:var(--line);
  margin-right:20px;flex-shrink:0;
}
.header-cta{
  display:inline-flex;
  align-items:center;gap:7px;
  padding:9px 18px;
  border-radius:9px;
  background:var(--primary);
  color:#fff;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:700;
  border:none;cursor:pointer;
  box-shadow:0 4px 14px rgba(11,74,153,.24);
  transition:background .15s,transform .14s,box-shadow .14s;
  text-decoration:none;white-space:nowrap;
}
.header-cta:hover{
  background:var(--primaryDark);transform:translateY(-1px);
  box-shadow:0 8px 22px rgba(11,74,153,.32);
}
.header-cta svg{
  width:14px;height:14px;stroke:#fff;fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;
}
/* Mobile call button — icon-only circle, sits left of the hamburger */
.nav-call-mobile{
  display:none;
  align-items:center;justify-content:center;
  width:38px;height:38px;
  border-radius:8px;
  background:var(--primary);
  color:#fff;
  margin-left:auto;
  flex-shrink:0;
}
.nav-call-mobile .icon{ width:17px;height:17px; }
.nav-call-mobile .icon svg{ stroke:#fff; }
.nav-call-mobile:hover{ background:var(--primaryDark); }
/* Hamburger */
.nav-toggle{
  display:inline-grid;place-items:center;
  width:38px;height:38px;
  border:1px solid var(--line);border-radius:8px;
  color:var(--primary);background:var(--white);cursor:pointer;
  margin-left:10px;flex-shrink:0;
}
/* Desktop: show nav + CTA, hide mobile call + hamburger */
@media(min-width:980px){
  .site-nav{display:flex;}
  .nav-cta-wrap{display:flex;}
  .nav-call-mobile{display:none;}
  .nav-toggle{display:none;}
}
/* Tablet/mobile: hide desktop CTA pill, show icon call button + hamburger side by side */
@media(max-width:979px){
  .site-header-inner{padding:0 20px;height:60px;}
  .site-nav{
    display:none;
    position:absolute;top:60px;left:0;right:0;
    flex-direction:column;align-items:stretch;
    background:#fff;
    border-bottom:1px solid var(--line);
    box-shadow:0 8px 24px rgba(7,26,63,.09);
    padding:8px 16px 16px;z-index:99;margin-left:0;
  }
  .site-nav.is-open{display:flex;}
  .site-nav a{padding:12px 12px;border-radius:8px;font-size:15px;}
  .site-nav a.is-active::after{display:none;}
  .nav-cta-wrap{display:none;}
  .nav-call-mobile{display:inline-flex;margin-left:auto;}
  .nav-toggle{margin-left:8px;}
}
/* ── END NAVBAR ──────────────────────────────────────────── */

/* ── ABOUT SECTION MOBILE ─────────────────────────────────── */
/* On mobile: eyebrow + heading first, then image, then text + stats */
@media(max-width:979px){
  .section.about{
    display:flex !important;
    flex-direction:column !important;
    gap:0 !important;
  }
  /* Text column: split into header part and body part */
  .section.about .section-copy{
    display:contents; /* unwrap so children can be individually ordered */
  }
  .section.about .section-copy .eyebrow{ order:1; margin-bottom:8px; }
  .section.about .section-copy h2{      order:2; margin-bottom:0; }
  .section.about .about-media{          order:3; margin:20px 0; }
  .section.about .section-copy p{       order:4; }
  .section.about .section-copy .check-list{ order:5; }

  /* Stats panel: force 3-col horizontal row */
  .stats-panel{
    grid-template-columns:repeat(3,1fr) !important;
    gap:0 !important;
  }
  .stats-panel li{
    border-right:1px solid var(--line) !important;
    border-bottom:0 !important;
    padding-bottom:0 !important;
  }
  .stats-panel li:last-child{ border-right:0 !important; }
}
@media(max-width:480px){
  .stats-panel{ padding:10px 8px !important; }
  .stats-panel strong{ font-size:20px !important; }
  .stats-panel span:last-child{ font-size:11px !important; }
  .stats-panel li{ padding:0 4px !important; }
}
/* ── END ABOUT MOBILE ─────────────────────────────────────── */
/* All sections share the hero's horizontal padding */
.section{
  padding-left:72px !important;
  padding-right:72px !important;
  max-width:none;
  box-sizing:border-box;
}
@media(max-width:979px){
  .section{padding-left:20px !important;padding-right:20px !important;}
}

/* About image — fixed height, no overflow */
.about-image{
  display:block;
  width:100%;
  height:470px !important;
  min-height:unset !important;
  max-height:unset !important;
  object-fit:cover;
  border-radius:16px;
  overflow:hidden;
}
div.about-image{
  height:470px !important;
}
/* Stats panel — sits cleanly below image, no negative margin */
.stats-panel{
  position:static !important;
  margin:18px 0 0 !important;
  width:100% !important;
  border-radius:14px !important;
  border:1px solid var(--line) !important;
  box-shadow:0 8px 28px rgba(7,26,63,.08) !important;
}
@media(max-width:700px){
  .about-image,div.about-image{height:260px !important;}
  /* stats panel stays 3-col — overridden above in the about-mobile block */
}
/* ── END SECTION + ABOUT ALIGNMENT ──────────────────────── */

/* ── REDESIGNED HERO v3 — Mobile-First Gradient Fade ──────── */
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap');

/* ════════════════════════════════════════════
   BASE HERO — shared across breakpoints
════════════════════════════════════════════ */
.hero-v2{
  position:relative;
  width:100%;
  overflow:hidden;
  display:flex;
  align-items:flex-end; /* content anchors to bottom on mobile */
}

/* Picture / image fills the entire hero */
.hero-v2 picture{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
}
.hero-v2-bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
  z-index:0;
}

/* Placeholder when no image */
.hero-v2-placeholder{
  position:absolute;
  inset:0;
  z-index:0;
  background:linear-gradient(145deg,#0d2a5e 0%,#1a4b8c 45%,#2f7bbf 100%);
  display:flex;align-items:center;justify-content:center;
}
.hero-v2-placeholder-inner{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  opacity:.35;color:#fff;
}
.hero-v2-placeholder-inner svg{ width:90px;height:90px;stroke:currentColor;fill:none;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round; }
.hero-v2-placeholder-inner span{ font-size:14px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#fff; }

/* Hide unused elements */
.hero-v2-right,.hero-v2-card,.hero-v2-badge,.hero-v2-blob1,.hero-v2-blob2,.hero-v2-curve,.hero-v2-img-overlay{ display:none; }

/* ════════════════════════════════════════════
   MOBILE HERO (≤768px) — Primary design
   Full-viewport, gradient fade from bottom
════════════════════════════════════════════ */
.hero-v2{
  min-height:90svh;
}

/* The gradient overlay — white at bottom fading to transparent at ~57% */
.hero-v2::after{
  content:'';
  position:absolute;
  inset:0;
  z-index:1;
  background:linear-gradient(
    to top,
    rgba(255,255,255,0.97) 0%,
    rgba(255,255,255,0.92) 30%,
    rgba(255,255,255,0.70) 50%,
    rgba(255,255,255,0.20) 75%,
    rgba(255,255,255,0)    95%
  );
  pointer-events:none;
}

/* Content — sits in bottom 40%, above gradient */
.hero-v2-left{
  position:relative;
  z-index:2;
  width:100%;
  max-width:100%;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:0 24px 40px;
}

/* Eyebrow */
.hero-v2-eyebrow{
  display:flex;
  align-items:center;
  gap:12px;
  margin:0 0 16px;
  color:#0b4a99;
}
.hero-v2-eyebrow-line{
  display:block;
  width:40px;
  height:1px;
  background:#0b4a99;
  flex-shrink:0;
}
.hero-v2-eyebrow-text{
  font-family:'DM Sans',sans-serif;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:#0b4a99;
  white-space:nowrap;
}

/* Headline */
.hero-v2-h1{
  font-family:'DM Serif Display',Georgia,serif;
  font-size:clamp(32px,8vw,55px);
  line-height:1.08;
  color:#071a3f;
  margin:0 0 14px;
  font-weight:400;
}
.hero-v2-h1 em{
  font-style:italic;
  color:#0b4a99;
}

/* Subtext */
.hero-v2-sub{
  font-family:Inter,Arial,sans-serif;
  font-size:16px;
  line-height:1.65;
  color:#3d4a5c;
  max-width:100%;
  margin:0 0 24px;
}

/* CTA row */
.hero-v2-actions{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
}

/* Primary CTA */
.hero-v2-btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 10px;
  border-radius:10px;
  background:var(--primary,#0b4a99);
  color:#fff;
  font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:700;
  letter-spacing:0.06em;
  text-transform:uppercase;
  border:none;cursor:pointer;
  box-shadow:0 6px 22px rgba(11,74,153,.30);
  transition:transform .18s ease,box-shadow .18s ease,background .18s;
  text-decoration:none;
  flex:1;
  justify-content:center;
  min-width:0;
}
.hero-v2-btn-primary:hover{
  background:var(--primaryDark,#07306c);
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(11,74,153,.38);
}
.hero-v2-btn-primary svg{
  width:15px;height:15px;stroke:#fff;fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;
}

/* Secondary CTA */
.hero-v2-btn-ghost{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 10px;
  border-radius:10px;
  background:rgba(166,139,75,.08);
  border:1.5px solid #0b4a99;
  color:#0b4a99;
  font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:700;
  letter-spacing:0.06em;
  text-transform:uppercase;
  cursor:pointer;
  transition:transform .18s ease;
  text-decoration:none;
  flex:0 0 auto;
  justify-content:center;
  white-space:nowrap;
}
.hero-v2-btn-ghost:hover{
  transform:translateY(-1px);
}
.hero-v2-btn-ghost svg{
  width:16px;height:16px;flex-shrink:0;
}

/* Buttons always sit side-by-side; primary grows, ghost stays content-width */

/* Fade-in animations */
/* .hero-v2-eyebrow animation removed — eyebrow element no longer rendered */
.hero-v2-h1     { animation:heroFadeUp .5s .13s both cubic-bezier(.22,.68,0,1.2); }
.hero-v2-sub    { animation:heroFadeUp .5s .20s both cubic-bezier(.22,.68,0,1.2); }
.hero-v2-actions{ animation:heroFadeUp .5s .27s both cubic-bezier(.22,.68,0,1.2); }
@keyframes heroFadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

══════════════════════════════════════════════════════════ */

/* Hide old separate progress wrap — stepper is now inside the shell */
.wiz-progress-wrap{ display: none !important; }

/* Wizard shell — card style matching reference image */
.wiz-shell{
  max-width: 700px;
  margin: 0 auto 80px;
  padding: 32px 32px 36px;
  background: #fff;
  border: 1.5px solid var(--line);

/* ── Inline stepper inside shell ── */
.wiz-stepper-inline{
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 28px;
}
.wiz-stepper-inline__step{
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.wiz-stepper-inline__dot{
  width: 32px; height: 32px;
  border-radius: 999px;
  background: #e2eaf5;
  border: 2px solid #c8d9ee;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800;
  color: var(--muted);
  transition: background .3s, border-color .3s, color .3s;

  function bindUi() {
    const toggle = document.querySelector(".nav-toggle");
    const nav = document.querySelector(".site-nav");
    if (toggle && nav) {
      toggle.addEventListener("click", () => {
        nav.classList.toggle("is-open");
        toggle.setAttribute("aria-expanded", nav.classList.contains("is-open"));
      });
    }
    document.querySelectorAll("form").forEach((form) => {
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        form.classList.add("is-submitted");
      });
    });

    // Active nav link: scroll spy
    const navLinks = document.querySelectorAll(".site-nav a[data-section]");
    const sections = Array.from(navLinks)
      .map(a => document.getElementById(a.dataset.section))
      .filter(Boolean);

    function updateActive() {
      const scrollY = window.scrollY + 120;
      let current = sections[0];
      for (const sec of sections) {
        if (sec.offsetTop <= scrollY) current = sec;
      }
      navLinks.forEach(a => {
        a.classList.toggle("is-active", a.dataset.section === (current && current.id));
      });
    }
    if (sections.length) {
      window.addEventListener("scroll", updateActive, { passive: true });
      updateActive();
    }

    // FAQ row accordion
    document.querySelectorAll("[data-faq]").forEach(row => {
      const btn = row.querySelector(".faq-row__trigger");
      if (!btn) return;
      btn.addEventListener("click", () => {
        const isOpen = row.classList.contains("faq-row--open");
        document.querySelectorAll("[data-faq]").forEach(r => {
          r.classList.remove("faq-row--open");
          const b = r.querySelector(".faq-row__trigger");
          if (b) b.setAttribute("aria-expanded", "false");
        });
        if (!isOpen) {
          row.classList.add("faq-row--open");
          btn.setAttribute("aria-expanded", "true");
        }
      });
    });

    // 3-Step Booking Wizard
    const panes   = [null,
      document.getElementById("wizPane1"),
      document.getElementById("wizPane2"),
      document.getElementById("wizPane3"),
      document.getElementById("wizPane4")];
    const steps   = document.querySelectorAll(".wiz-step");
    const fill    = document.getElementById("wizFill");
    const summary = document.getElementById("wizSummary");

    if (!panes[1]) return; // not on booking page

    function showPane(n) {
      panes.forEach((p, i) => { if (i > 0) p.classList.toggle("wiz-pane--hidden", i !== n); });
      // update inline stepper dots
      document.querySelectorAll(".wiz-stepper-inline__step").forEach((s, i) => {
        const stepNum = i + 1;
        s.classList.toggle("wiz-stepper-inline__step--active", stepNum === n);
        s.classList.toggle("wiz-stepper-inline__step--done", stepNum < n);
      });
      // update connector lines
      const line1 = document.getElementById("wizLine1");
      const line2 = document.getElementById("wizLine2");
      if (line1) line1.classList.toggle("wiz-stepper-inline__line--done", n > 1);
      if (line2) line2.classList.toggle("wiz-stepper-inline__line--done", n > 2);
      const wizShell = document.querySelector(".wiz-shell");
      if (wizShell) {
        const offset = wizShell.getBoundingClientRect().top + window.scrollY - 90;
        window.scrollTo({ top: offset, behavior: "smooth" });
      }
    }

    function buildSummary() {
      if (!summary) return;
      const svc  = document.querySelector('input[name="service"]:checked');
      const date = { value: document.getElementById("bookDate") ? document.getElementById("bookDate").value : "—" };
      const time = document.querySelector('input[name="time"]:checked');
      const rows = [
        { label:"Service", val: svc  ? svc.value  : "—" },
        { label:"Date",    val: date ? date.value  : "—" },
        { label:"Time",    val: time ? time.value  : "—" }
      ].map(r => `<div class="wiz-summary-row"><strong>${r.label}</strong><span>${r.val}</span></div>`).join("");
      summary.innerHTML = rows;
      summary.classList.add("is-visible");
    }

    // Generate date buttons as a horizontal slider
    (function() {
      const row = document.getElementById("dateBtnRow");
      const slotGrid = document.getElementById("slotGrid");
      const prevBtn = document.getElementById("dateSliderPrev");
      const nextBtn = document.getElementById("dateSliderNext");
      if (!row || !slotGrid) return;

      const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

      // Build 14 date buttons for more scroll room
      const dates = [];
      for (let i = 0; i < 14; i++) {
        const d = new Date();
        d.setDate(d.getDate() + i);
        dates.push(d);
      }

      function pad(n){ return String(n).padStart(2,'0'); }
      function formatValue(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

      // Slider offset state
      let sliderIndex = 0;
      const BTN_WIDTH = 72; // 64px btn + 8px gap

      function getVisibleCount() {
        const track = document.querySelector(".date-slider-track");
        if (!track) return 4;
        return Math.floor(track.clientWidth / BTN_WIDTH);
      }

      function updateSlider() {
        const visible = getVisibleCount();
        const maxIndex = Math.max(0, dates.length - visible);
        sliderIndex = Math.min(sliderIndex, maxIndex);
        row.style.transform = `translateX(-${sliderIndex * BTN_WIDTH}px)`;
        if (prevBtn) prevBtn.style.opacity = sliderIndex === 0 ? "0.35" : "1";
        if (nextBtn) nextBtn.style.opacity = sliderIndex >= maxIndex ? "0.35" : "1";
        if (prevBtn) prevBtn.style.pointerEvents = sliderIndex === 0 ? "none" : "auto";
        if (nextBtn) nextBtn.style.pointerEvents = sliderIndex >= maxIndex ? "none" : "auto";
      }

      if (prevBtn) prevBtn.addEventListener("click", () => { sliderIndex = Math.max(0, sliderIndex - 1); updateSlider(); });
      if (nextBtn) nextBtn.addEventListener("click", () => {
        const visible = getVisibleCount();
        sliderIndex = Math.min(dates.length - visible, sliderIndex + 1);
        updateSlider();
      });

      // Generate 30-min slots from 7 PM to 10 PM (clinic hours)
      const slots = [];
      for (let h = 19; h < 22; h++) {
        slots.push(`${h - 12}:00 PM`);
        slots.push(`${h - 12}:30 PM`);
      }

      function renderSlots() {
        slotGrid.innerHTML = slots.map(t => `
          <label class="time-pill">
            <input type="radio" name="time" value="${t}" />
            <span>${t}</span>
          </label>`).join("");
      }

      dates.forEach((d, i) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "date-btn" + (i === 0 ? " is-active" : "");
        if (i === 1) btn.setAttribute("data-tomorrow", "");
        const label = i === 0 ? "Today" : i === 1 ? "Tomorrow" : DAYS[d.getDay()];
        btn.innerHTML = `<span class="date-btn__label">${label}</span><span class="date-btn__num">${d.getDate()}</span><span class="date-btn__day">${MONTHS[d.getMonth()]}</span>`;
        btn.addEventListener("click", () => {
          row.querySelectorAll(".date-btn").forEach(b => b.classList.remove("is-active"));
          btn.classList.add("is-active");
          document.getElementById("bookDate").value = formatValue(d);
        });
        row.appendChild(btn);
        if (i === 0) document.getElementById("bookDate").value = formatValue(d);
      });

      renderSlots();
      updateSlider();
    })();

    showPane(1);

    const n1 = document.getElementById("wizNext1");
    const n2 = document.getElementById("wizNext2");
    const b2 = document.getElementById("wizBack2");
    const b3 = document.getElementById("wizBack3");
    const sub = document.getElementById("wizSubmit");

    if (n1) n1.addEventListener("click", () => showPane(2));
    if (b2) b2.addEventListener("click", () => showPane(1));
    if (n2) n2.addEventListener("click", () => {
      // Validate: a time slot must be selected
      const selectedTime = document.querySelector('input[name="time"]:checked');
      if (!selectedTime) {
        const slotGrid = document.getElementById("slotGrid");
        if (slotGrid) {
          slotGrid.style.outline = "2px solid #e53e3e";
          slotGrid.style.borderRadius = "10px";
          // Show inline error
          let err = document.getElementById("slotError");
          if (!err) {
            err = document.createElement("p");
            err.id = "slotError";
            err.style.cssText = "color:#e53e3e;font-size:13px;font-weight:600;margin:8px 0 0;";
            err.textContent = "Please select a time slot to continue.";
            slotGrid.parentElement.appendChild(err);
          }
          slotGrid.scrollIntoView({ behavior: "smooth", block: "center" });
        }
        return;
      }
      // Clear any error
      const slotGrid = document.getElementById("slotGrid");
      if (slotGrid) {
        slotGrid.style.outline = "";
        const err = document.getElementById("slotError");
        if (err) err.remove();
      }
      buildSummary();
      showPane(3);
    });
    if (b3) b3.addEventListener("click", () => showPane(2));
    if (sub) sub.addEventListener("click", () => {
      // Validate name and phone are filled
      const nameInput = document.querySelector('#wizPane3 input[name="name"]');
      const phoneInput = document.querySelector('#wizPane3 input[name="phone"]');
      let valid = true;

      [{input: nameInput, errId: "wizNameErr", msg: "Please enter your full name."},
       {input: phoneInput, errId: "wizPhoneErr", msg: "Please enter your phone number."}
      ].forEach(({input, errId, msg}) => {
        if (!input) return;
        let err = document.getElementById(errId);
        if (!input.value.trim()) {
          valid = false;
          input.style.borderColor = "#e53e3e";
          input.style.boxShadow = "0 0 0 3px rgba(229,62,62,.15)";
          if (!err) {
            err = document.createElement("p");
            err.id = errId;
            err.style.cssText = "color:#e53e3e;font-size:13px;font-weight:600;margin:4px 0 0;";
            err.textContent = msg;
            input.parentElement.after(err);
          }
        } else {
          input.style.borderColor = "";
          input.style.boxShadow = "";
          if (err) err.remove();
        }
      });

      if (!valid) {
        (nameInput && !nameInput.value.trim() ? nameInput : phoneInput).scrollIntoView({ behavior: "smooth", block: "center" });
        return;
      }
      showPane(4);
    });
  }

  applyTheme();
  app.innerHTML = page === "booking" ? bookingPage() : homePage();
  if (page === "booking") document.body.classList.add("page-booking");
  bindUi();

})();

        // Telehealth / Online consultation
        { keys:["telehealth","online consultation","video consultation","virtual","video call","remote consultation","online doctor"],

        // Sunday

        { keys:["wait","waiting","queue","how long","delay","average wait","wait time"],
          answer:"Patients have reported <strong>less than 10 minutes wait time</strong> on average. Booking an appointment in advance helps reduce your waiting time further." },

        // Reviews / Trust
        { keys:["review","rating","feedback","experience","good","recommend","trust","patient","opinion"],
          answer:"Dr. Ahmed Raza has excellent patient reviews. Patients highlight his <strong>compassionate care, thorough consultations, and clear explanations</strong>. He is rated highly on Google Maps and is known for not rushing appointments." },

        // Greetings
        { keys:["hello","hi","hey","salam","assalam","good morning","good evening","good afternoon","howdy"],
          answer:"Hello! 👋 I'm the Patient Assistant for Dr. Ahmed Raza's clinic. I can help you with clinic timings, fees, appointments, specialties, and more. What would you like to know?" },

        // Thanks
        { keys:["thank","thanks","thankyou","thank you","shukria","shukriya"],
          answer:"You're welcome! 😊 If you have any more questions or need to book an appointment, feel free to ask. We're here to help!" },

        // Bye
        { keys:["bye","goodbye","see you","take care","ok bye","ok thanks"],
          answer:"Thank you for visiting! 😊 For appointments, call <strong>+92 51 111 2233</strong> or book online. Stay healthy!" },
      ];

      const FALLBACK = "To get updated information about this matter, you can contact the clinic directly at <strong>+92 51 111 2233</strong>.";

      function getAnswer(msg) {
        const m = msg.toLowerCase().replace(/[^a-z0-9\s\-]/g,"");
        const words = m.split(/\s+/);
        let best = null, bestScore = 0;
        for (const entry of KB) {
          let score = 0;
          for (const key of entry.keys) {
            if (m.includes(key)) score += key.length > 4 ? 3 : 1;
          }
          if (score > bestScore) { bestScore = score; best = entry; }
        }
        return bestScore > 0 ? best.answer : FALLBACK;
      }

      /* ── DOM REFS ──────────────────────────────────────────── */
      const fab     = document.getElementById("chatFab");
      const widget  = document.getElementById("chatWidget");
      const msgs    = document.getElementById("chatMessages");
      const input   = document.getElementById("chatInput");
      const sendBtn = document.getElementById("chatSendBtn");
      const closeBtn= document.getElementById("chatCloseBtn");
      const chips   = document.querySelectorAll(".chat-chip");
      const openIcon = fab.querySelector(".chat-fab-icon--open");
      const closeIcon= fab.querySelector(".chat-fab-icon--close");

      let isOpen = false;
      let greeted = false;

      /* ── HELPERS ───────────────────────────────────────────── */
      function botIconSvg(){
        return `<div class="chat-bot-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></div>`;
      }

      function addBotMsg(html){
        const div = document.createElement("div");
        div.className = "chat-msg chat-msg--bot";
        div.innerHTML = `${botIconSvg()}<div class="chat-bubble">${html}</div>`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
      }

      function addUserMsg(text){
        const div = document.createElement("div");
        div.className = "chat-msg chat-msg--user";
        div.innerHTML = `<div class="chat-bubble">${escHtml(text)}</div>`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
      }

      function escHtml(s){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

      function showTyping(){
        const div = document.createElement("div");
        div.className = "chat-msg chat-msg--bot chat-typing";
        div.id = "chatTyping";
        div.innerHTML = `${botIconSvg()}<div class="chat-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        return div;
      }

      function removeTyping(){ const t = document.getElementById("chatTyping"); if(t) t.remove(); }

      function reply(userText){
        addUserMsg(userText);
        const typing = showTyping();
        setTimeout(()=>{
          removeTyping();
          addBotMsg(getAnswer(userText));
        }, 650 + Math.random()*300);
      }

      /* ── OPEN / CLOSE ──────────────────────────────────────── */
      function openChat(){
        isOpen = true;
        widget.classList.add("is-open");
        widget.setAttribute("aria-hidden","false");
        openIcon.style.display = "none";
        closeIcon.style.display = "flex";
        if(!greeted){
          greeted = true;
          setTimeout(()=>{
            addBotMsg("Hello!👋 <br>I'm the <strong>Patient Assistant</strong> for Dr. Ahmed Raza's clinic. How can I help you today?");
          }, 180);
        }
        setTimeout(()=>input.focus(), 250);
      }

      function closeChat(){
        isOpen = false;
        widget.classList.remove("is-open");
        widget.setAttribute("aria-hidden","true");
        openIcon.style.display = "flex";
        closeIcon.style.display = "none";
      }

      fab.addEventListener("click", ()=> isOpen ? closeChat() : openChat());
      fab.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); isOpen ? closeChat() : openChat(); }});
      closeBtn.addEventListener("click", closeChat);

      /* ── SEND ──────────────────────────────────────────────── */
      function send(){
        const text = input.value.trim();
        if(!text) return;
        input.value = "";
        if(!greeted){ greeted = true; }
        reply(text);
      }

      sendBtn.addEventListener("click", send);
      input.addEventListener("keydown", e=>{ if(e.key==="Enter") send(); });

      /* ── CHIPS ─────────────────────────────────────────────── */
      chips.forEach(chip => {
        chip.addEventListener("click", ()=>{
          const q = chip.dataset.q;
          if(!isOpen) openChat();
          setTimeout(()=> reply(q), greeted ? 0 : 250);
        });
      });

      /* ── FAB VISIBILITY: appear only after the hero is scrolled past ── */
      const heroEl = document.querySelector(".hero-v2") || document.querySelector(".hero");
      if (heroEl && "IntersectionObserver" in window) {
        const heroObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            fab.classList.toggle("is-visible", !entry.isIntersecting);
          });
        }, { threshold: 0.05 });
        heroObserver.observe(heroEl);
      } else {
        // Fallback: reveal after a short delay if hero can't be found
        setTimeout(()=> fab.classList.add("is-visible"), 800);
      }

    })();
    </script>
